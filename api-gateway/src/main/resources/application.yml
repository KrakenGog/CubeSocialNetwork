server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      
      routes:
        - id: auth-service
          uri: lb://auth-service 
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=1
        - id: message-service-websocket
          
          uri: lb:ws://message-service 
          predicates:
            - Path=/ws/**
          

eureka:
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: MySuperSecretKeyWhichMustBeVeryLongAndComplex1234567890
  lifetime: 86400000