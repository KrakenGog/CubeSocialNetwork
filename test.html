<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WebSocket Test</title>
    <!-- Подключаем SockJS и STOMP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <h2>Тест WebSocket: Cube Message Controller</h2>
    
    <div>
        <button onclick="connect()">1. Подключиться</button>
        <button onclick="disconnect()" disabled id="disconnectBtn">Отключиться</button>
    </div>
    <br>
    <div>
        <input type="text" id="messageText" placeholder="Введите текст сообщения">
        <button onclick="sendMessage()" disabled id="sendBtn">2. Отправить</button>
    </div>
    
    <div id="logs" style="margin-top: 20px; font-family: monospace; color: green;"></div>

    <script>
        let stompClient = null;

        function log(message) {
            document.getElementById('logs').innerHTML += message + '<br>';
            console.log(message);
        }

        function connect() {
            // Укажите ваш порт (по умолчанию 8080)
            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);

            // Если у вас JWT авторизация, то токен передается в заголовках здесь:
            const headers = {
                 'Authorization': 'Bearer eyJhbGciOiJIUzM4NCJ9.eyJzdWIiOiJsZXNoYTEyMyIsImlhdCI6MTc3NDg3NDM2OCwicm9sZXMiOlsiUk9MRV9VU0VSIl0sImlkIjoxMCwiZXhwIjoxNzc0OTYwNzY4fQ.v5HXEwqtUBY17oiILt2WCvPoES8MZNErUzHjwXpiL-2uOeINjE8FMPzNwA9Qn66L' 
            };

            stompClient.connect(headers, function (frame) {
                log('Успешно подключено: ' + frame);
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('sendBtn').disabled = false;

                // Если вы хотите СЛУШАТЬ входящие сообщения (зависит от того, куда ваш MessageService их отправляет)
                // stompClient.subscribe('/topic/chat.1', function (response) {
                //     log('Получено сообщение: ' + response.body);
                // });

            }, function(error) {
                log('<span style="color:red">Ошибка подключения: ' + error + '</span>');
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
            }
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            log('Отключено');
        }

        function sendMessage() {
            const text = document.getElementById('messageText').value;
            
            // Заполните поля так, как они называются в вашем CreateMessageRequest
            const createMessageRequest = {
                text: text,     // замените на реальное поле из вашей DTO
                chatId: 1       // замените на реальное поле из вашей DTO
            };

            // Отправляем по префиксу /app (из конфига) + /chat.sendMessage (из контроллера)
            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(createMessageRequest));
            log('Отправлено: ' + JSON.stringify(createMessageRequest));
        }
    </script>
</body>
</html>
